<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie</title>
</head>
<body>
    <h1>Ma Galerie Photo du Cameroun</h1>
    <p>Decouvrez les merveilles du Cameroun a travers mes photos</p>
    <section>
        <h2>Paysages</h2>
        <figure>
            <img src="img.jpg" alt="Mont Cameroon au coucher du soliel" width="400" height="300">
            <figcaption>Mont Cameroun, un volcan majestueux</figcaption>
        </figure>
        <figure>
            <img src="img.jpg" alt="Plonge a Kribi" width="300" height="400">
            <figcaption>Les fonds marins de Kribi</figcaption>
        </figure>
    </section>
    <section>
        <h2>Villes</h2>
        <figure>
            <img src="img.jpg" alt="Yaounde la capital" width="500" height="250">
            <figcaption>Yaounde, la ville aux sept collines</figcaption>
        </figure>
        <figure>
            <img src="img.jpg" alt="Douala la metropole" width="250" height="350">
            <figcaption>Douala, le poumou economique</figcaption>
        </figure>
    </section>
    <section>
        <h2>Culture</h2>
        <figure>
            <img src="img.jpg" alt="Danse traditionnelle bamileke" width="350" height="300">
            <figcaption>Danse traditionnelle bamileke</figcaption>
        </figure>
        <figure>
            <img src="img.jpg" alt="Festival Ndem" width="300" height="350">
            <figcaption>Festival Ndema Bamenda</figcaption>
        </figure>
    </section>
</body>
</html>
